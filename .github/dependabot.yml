version: 2
updates:
  - package-ecosystem: "github-actions"
    target-branch: "dev"
    directory: "/"
    labels:
      - "cicd"
    open-pull-requests-limit: 10
    schedule:
      interval: "daily"

  - package-ecosystem: "pip"
    target-branch: "dev"
    directory: "/"
    labels:
      - "dependency"
    versioning-strategy: "increase-if-necessary"
    open-pull-requests-limit: 10
    schedule:
      interval: "daily"
